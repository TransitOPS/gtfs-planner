services:
  postgres:
    image: postgres:18.1
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
  gtfs-planner:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PORT=4000
      - PHX_SERVER=true
      - PHX_HOST=localhost
      - SECRET_KEY_BASE=xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      - DATABASE_URL=ecto://postgres:postgres@postgres:5432/gtfs_planner_dev
      - OTP_JAR_PATH=/opt/otp/otp.jar
      - OTP_OSM_PATH=/opt/otp/data/philadelphia.osm.pbf
      - GTFS_TASK_ARTIFACTS_PATH=/app/var/gtfs-task-artifacts
      - GTFS_TASK_ARTIFACTS_MAX_RUN_BYTES=157286400
      - GTFS_TASK_ARTIFACTS_MAX_TOTAL_BYTES=1073741824
      - GTFS_TASK_ARTIFACTS_TTL_SECONDS=86400
      - GEOAPIFY_API_KEY=${GEOAPIFY_API_KEY:-}
    ports:
      - "4000:4000"
    volumes:
      - uploads:/app/lib/gtfs_planner-0.1.0/priv/static/uploads
      - uploads:/app/var/gtfs-task-artifacts
    depends_on:
      - postgres

volumes:
  pgdata:
  uploads:
